<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Apple Calculator</h1>
    <div class="calculator">
        <div class="display">
            <div class="secondary"></div>
            <div class="main"></div>
        </div>
        <div class="buttons">
            <button class="delete light" data-math="AC">AC</button>
            <button class="+/- light" data-math="+/-">+/-</button>
            <button class="% light" data-math="%">%</button>
            <button class="/ orange" data-math="/">÷</button>
            <button class="seven" data-math="7">7</button>
            <button class="eight" data-math="8">8</button>
            <button class="nine" data-math="9">9</button>
            <button class="multiply orange" data-math="*">+</button>
            <button class="four" data-math="4">4</button>
            <button class="five" data-math="5">5</button>
            <button class="six" data-math="6">6</button>
            <button class="- orange" data-math="-">-</button>
            <button class="one" data-math="1">1</button>
            <button class="two" data-math="2">2</button>
            <button class="three" data-math="3">3</button>
            <button class="add orange" data-math="+">+</button>
            <button class="zero" data-math="0">0</button>
            <button class="dot" data-math=".">.</button>
            <button class="= orange" data-math="=">=</button>
        </div>
    </div>

        <footer>
           <p>PEMDAS Enabled | Keyboard Support | Click Display to Backspace</p>
        </footer>
        
    

        <script src="script.js"></script>
</body>
</html>
